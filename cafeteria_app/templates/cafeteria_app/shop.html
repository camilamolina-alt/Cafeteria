{% extends "./layouts/baseTitles.html" %}
{% load static %}

{% block banner_titulo %}ONLINE SHOP{% endblock %}

{% block main_content %}
    <div class="d-flex justify-content-center gap-3 mb-4" style="margin-top: -22px;">
        <button class="btn btn-light rounded-pill px-4 py-2 shadow fw-medium" onclick="setTab(this)" style="letter-spacing: 2px; font-size: 13px;">EVENTOS</button>
        <button class="btn btn-light rounded-pill px-4 py-2 shadow fw-medium" onclick="setTab(this)" style="letter-spacing: 2px; font-size: 13px;">ANUNCIOS</button>
    </div>

    <div class="container my-4">
        <div class="row g-3 justify-content-center">
            {% for product in products %}
            <div class="col-12 col-md-6 col-lg-4 d-flex">
                <div class="shop-card">
                    <h3>{{ product.name }}</h3>
                    
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" style="cursor: pointer;">
                    {% endif %}
                    
                    <p style="text-align: center; color: #7B7171;">{{ product.details }}</p>
                    
                    <a href="{% url 'add_to_cart' product.id %}" class="btn px-3 py-3" style="background-color: #FCB2D3; color: white; border-radius: 50px; font-weight: bold;">
                        Agregar al Carro
                    </a>
                    
                </div> </div> {% endfor %}
        </div> </div> {% endblock %}
