{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'cafeteria_app/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Cafeteria</title>
</head>


<body>
  <div class="container-principal">

    <nav class="navbar navbar-expand-lg navbar-cafe py-3">
  <div class="container-fluid d-flex justify-content-between align-items-center px-5">
    
    <div class="navbar-brand-container">
      <a class="navbar-brand" href="{% url 'index' %}">SHIBAL</a>
    </div>
    
    <ul class="nav-links" style="display: flex; gap: 40px; margin: 0; list-style: none; padding: 0; align-items: center;">
      <li><a class="nav-link" href="{% url 'shop' %}">Shop</a></li>
      <li><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
      <li><a class="nav-link" href="{% url 'gallery' %}">Gallery</a></li>
      <li><a class="nav-link" href="{% url 'events' %}">Events</a></li>
    </ul>

    <ul class="nav-user" style="display: flex; gap: 20px; margin: 0; list-style: none; padding: 0; align-items: center;">
      <li><a class="nav-identification" href="{% url 'login' %}">Login</a></li>
      <li><a class="nav-identification" href="{% url 'cart' %}">Carro</a></li>
      </ul>
  </div>
</nav>

<!-- CARRUSEL PRODUCTOS BANNER-->
<div id="carousel-Indicators" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <!-- Banner -->
    <div class="carousel-item active">
      <img src="{% static 'cafeteria_app/img/banners/Drinks.jpg' %}" class="d-block w-100" alt="Banner 1">
    </div>
<div class="carousel-item">
  <img src="{% static 'cafeteria_app/img/banners/Cookies.jpg' %}" class="d-block w-100" alt="Banner 2">
</div>
<div class="carousel-item">
  <img src="{% static 'cafeteria_app/img/banners/Macarrons.jpg' %}" class="d-block w-100" alt="Banner 3">
</div>
  </div>
  
</div>
  </div>


<!-- CARRUSEL NUEVOS PRODUCTOS -->
<div class="contenedor-productos p-5 shadow-sm">
  <div> <h2 style="text-align: center; margin-top: 20px; color: #7B7171; font-size: 20px; letter-spacing: 0.5px;font-weight: lighter;">Nuevo Menu</h2> </div>
    <div id="carousel-NewMenu" class="carousel slide" data-bs-ride="carousel">
        
      <div class="carousel-inner"> 
          <div class="carousel-item active">
            <div class="d-flex flex-row justify-content-center align-items-center py-5 gap-4 flex-nowrap">  
              <div class="card h-100 p-2 product-image">
                <img src="{% static 'cafeteria_app/img/newProducts/new_matchaRoll.jpg' %}" class="card-img-top img-fluid" alt="Matcha Roll" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
                <div class="card-body pb-0 text-center">
                  <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Matcha Roll</p>
                </div>
              </div>
<!-- CARRUSEL NUEVOS PRODUCTOS PRIMERO -->
              <div class="card h-100 p-2 product-image">
                <img src="{% static 'cafeteria_app/img/newProducts/new_orangeCake.jpg' %}" class="card-img-top img-fluid" alt="Orange Cake" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
                <div class="card-body pb-0 text-center">
                  <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Orange Cake</p>
                </div>
              </div>

              <div class="card h-100 p-2 product-image">
                <img src="{% static 'cafeteria_app/img/newProducts/new_coffe.jpg' %}" class="card-img-top img-fluid" alt="Cafe Caramelo" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
                <div class="card-body pb-0 text-center">
                  <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Caramel Latte</p>
                </div>
              </div>
                    
              <div class="card h-100 p-2 product-image">
                <img src="{% static 'cafeteria_app/img/newProducts/new_cheescake.jpg' %}" class="card-img-top img-fluid" alt="Cheescake" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
                <div class="card-body pb-0 text-center">
                  <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Cheescake</p>
                </div>
              </div>
            </div> 
          </div> 
<!-- CARRUSEL NUEVOS PRODUCTOS SEGUNDO-->
      <div class="carousel-item">
        <div class="d-flex flex-row justify-content-center align-items-center py-5 gap-4 flex-nowrap"> 

          <div class="card h-100 p-2 product-image">
            <img src="{% static 'cafeteria_app/img/newProducts/new_grapeCake.jpg' %}" class="card-img-top img-fluid" alt="Grape Cake" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
            <div class="card-body pb-0 text-center">
              <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Grape Cake</p>
            </div>
          </div>

          <div class="card h-100 p-2 product-image">
            <img src="{% static 'cafeteria_app/img/newProducts/new_hotChocolate.jpg' %}" class="card-img-top img-fluid" alt="Hot Chocolate" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
            <div class="card-body pb-0 text-center">
              <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Hot Chocolate</p>
            </div>
          </div>

          <div class="card h-100 p-2 product-image">
            <img src="{% static 'cafeteria_app/img/newProducts/new_berryRoll.jpg' %}" class="card-img-top img-fluid" alt="Berry Roll" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
            <div class="card-body pb-0 text-center">
              <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">Berry Roll</p>
            </div>
          </div>

          <div class="card h-100 p-2 product-image">  <!--VER QUE LE PASA PORQUE SE VE MAS GRANDE QUE LOS DEMAS SHIBAAAAL--> <!-- es el flexbox-- -->
            <img src="{% static 'cafeteria_app/img/newProducts/new_strawberryCake.jpg' %}" class="card-img-top img-fluid" alt="Strawberry Cake" style="cursor: pointer; border-radius: 20px; object-fit: cover; height: 180px;">
            <div class="card-body pb-0 text-center">
              <p class="text-uppercase font-weight-bold" style="color: #7B7171; letter-spacing: 1px;">StraCake</p>
            </div>
          </div>
        </div> 
      </div> 
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carousel-NewMenu" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carousel-NewMenu" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

















  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
