{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'cafeteria_app/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Cafeteria</title>
</head>


<body>
  <div class="container-principal">

    <nav class="navbar navbar-expand-lg navbar-cafe py-3">
  <div class="container-fluid d-flex justify-content-between align-items-center px-5">
    
    <div class="navbar-brand-container">
      <a class="navbar-brand" href="{% url 'index' %}">SHIBAL</a>
    </div>
    
    <ul class="nav-links" style="display: flex; gap: 40px; margin: 0; list-style: none; padding: 0; align-items: center;">
      <li><a class="nav-link" href="{% url 'shop' %}">Shop</a></li>
      <li><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
      <li><a class="nav-link" href="{% url 'gallery' %}">Gallery</a></li>
      <li><a class="nav-link" href="{% url 'events' %}">Events</a></li>
    </ul>

    <ul class="nav-user" style="display: flex; gap: 20px; margin: 0; list-style: none; padding: 0; align-items: center;">
      <li><a class="nav-identification" href="{% url 'login' %}">Login</a></li>
      <li><a class="nav-identification" href="{% url 'cart' %}">Carro</a></li>
      </ul>
  </div>
</nav>

<!-- CARRUSEL -->
<div id="carousel-Indicators" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carousel-Indicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
<div class="carousel-item active">
  <img src="{% static 'cafeteria_app/img/Drinks.jpg' %}" class="d-block w-100" alt="Banner 1">
</div>
<div class="carousel-item">
  <img src="{% static 'cafeteria_app/img/Cookies.jpg' %}" class="d-block w-100" alt="Banner 2">
</div>
<div class="carousel-item">
  <img src="{% static 'cafeteria_app/img/Macarrons.jpg' %}" class="d-block w-100" alt="Banner 3">
</div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carousel-Indicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carousel-Indicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>



  </div>







  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
