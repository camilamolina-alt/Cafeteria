{% extends "./layouts/base.html" %}
{% load static %} <!DOCTYPE html>
{% block title %}Events{% endblock %}

    <div class="py-5 text-center" style="background: #e8e0f5; border-radius: 0 0 2rem 2rem;">
        <h1 class="fw-semibold text-secondary" style="letter-spacing: 6px;">EVENTS</h1>
    </div>
    <!--aqui deberia ir los botones del evento-->
    <div class="d-flex justify-content-center gap-3" style="margin-top: -22px;">

      EVENTOS
