{% extends "./layouts/baseNav_Check.html" %}
{% load static %}
{% block content %}

<div class="productos">
  <div class="producto">
    <img src="{% static 'cafeteria_app/img/newProducts/new_matchaRoll.jpg' %}" alt="Matcha Roll">
    <h3>Matcha Roll</h3>
    <p>$4.500</p>
    <button onclick="agregarAlCarro('Matcha Roll', 4500)">Agregar al Carro</button>
  </div>
</div>


<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
  <div class="offcanvas-header">
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    ...
  </div>
</div>

<div class="cart">
  <h2>Carro de Compras</h2>
  <div class="cart-items">
    <ul id="cart-items"></ul>
    <p>El total es: <span id="cart-total"></span></p>
  </div>
</div>

<script src="{% static 'cafeteria_app/js/carro.js' %}"></script>

{% endblock %}
