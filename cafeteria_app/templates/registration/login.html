{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'cafeteria_app/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Cafeteria</title>
</head>
<body class="text-center login-body mt-5 ">
    <main class="form-signin">
        <form action="" method="post">
            {% csrf_token %}
            <h1 class="mb-4 fw-normal"style="font-family: 'Bubbler One', sans-serif; color: #1FBBE7; font-size: 3rem; font-weight: bold; letter-spacing: 1px;">Please sign in</h1>
                <div class="form-floating">
                    <input type="text" name="username" class="form-control" id="floatingUser" placeholder="Tu nombre de usuario">
                    <label for="floatingInput" style="color: #B3AAAA; font-family: 'Montserrat', sans-serif;">Username</label>
                </div>
                <!--CONTRASENA-->
                <div class="form-floating">
                    <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password">
                    <label for="floatingPassword" style="color: #B3AAAA; font-family: 'Montserrat', sans-serif;">Password</label>
                </div>
                <div class="checkbox mt-3" style="color: #7B7171; font-family: 'Montserrat', sans-serif; text-align: left; padding-left: 5px;">
                    <label>
                        <input type="checkbox" value="remember-me"> Remember me
                    </label>
                </div>
            <button class="w-100 mt-4 btn btn-lg" style="background-color: #FCB2D3; color: white; font-family: 'Montserrat', sans-serif;" type="submit">Sign in</button>
            <p class="mt-5 mb-3 text-muted">&copy;2026</p>

        </form>
        
        {% if error %}
            <div class="alert alert-danger mt-3" role="alert" style="font-family: 'Montserrat', sans-serif; border-radius: 15px;">
                Invalid username or password. Please try again.
            </div>
        {% endif %}
    
    </main>
</body>
