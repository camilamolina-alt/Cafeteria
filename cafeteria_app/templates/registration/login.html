{% extends "cafeteria_app/layouts/base.html" %}
{% load static %}

{% block content %}
<div class="text-center login-body mt-5">
    <main class="form-signin">
        <form action="" method="post">
            {% csrf_token %}
            <h1 class="mb-4 fw-normal" style="font-family: 'Bubbler One', sans-serif; color: #1FBBE7; font-size: 3rem; font-weight: bold; letter-spacing: 1px;">Bienvenido</h1>
            
            <div class="form-floating position-relative mb-3">
                <input type="text" name="username" class="form-control" id="floatingUser" placeholder="Username">
                <label for="floatingUser" style="color: #B3AAAA; font-family: 'Montserrat', sans-serif;">Username</label>
                <i class="bx bx-user" style="color:#B3AAAA; font-size: 1.5rem; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
            </div>
            
            <div class="form-floating position-relative">
                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword" style="color: #B3AAAA; font-family: 'Montserrat', sans-serif;">Password</label>
                <i class="bx bx-lock-alt" style="color:#B3AAAA; font-size: 1.5rem; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
            </div>

            <div class="checkbox mt-3" style="color: #7B7171; font-family: 'Montserrat', sans-serif; text-align: left; padding-left: 5px;">
                <label>
                    <input type="checkbox" value="remember-me"> Remember me
                </label>
            </div>
            
            <button class="w-100 mt-4 btn btn-lg" style="background-color: #FCB2D3; color: white; font-family: 'Montserrat', sans-serif;" type="submit">Sign in</button>
            {% if form.errors %}
            <div class="alert alert-danger mt-3"style="color: #7B7171; font-family: 'Montserrat', sans-serif; border-radius: 5px;">Usuario o contraseña incorrectos.</div>
            {% endif %}
            
            <div class="mt-3 text-center" style="font-family: 'Montserrat', sans-serif;">
                <p style="color: #7B7171;">¿No tienes cuenta?<a href="{% url 'signup' %}" style="color: #FCB2D3; font-weight: bold; text-decoration: none;">Regístrate aquí</a></p>
            </div>
            <p class="mt-5 mb-3">&copy;2026</p>
        </form>
    </main>
</div>
{% endblock %}
