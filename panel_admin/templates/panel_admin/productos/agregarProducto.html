{% extends 'panel_admin/base.html' %}
{% load crispy_forms_tags %}

{% block js %}
{{ block.super }}
<script>
    function confirmarGuardarProducto() {
        Swal.fire({
            "title": "¿Crear nuevo producto?",
            "text": "Se registrará el producto en el catálogo del sistema",
            "icon": "info",
            "showCancelButton": true,
            "confirmButtonText": "Sí, guardar",
            "cancelButtonText": "No, cancelar",
            "reverseButtons": true
        })
        .then(function(result) {
            if (result.isConfirmed) {
                // Enviamos el formulario de productos manualmente por su ID
                document.getElementById('formAgregarProducto').submit();
            }
        });
    }
</script>
{% endblock %}

{% block main %}
<br><br>
<div class="col-12 col-md-6 offset-md-3">
    <div class="card">
        <div class="card-body">
            <h2 style="font-family: 'Montserrat', sans-serif; color: #e4228d;">Agregar Productos</h2>
            <hr class="border-secondary opacity-25">
            <br>
            <div class="row">
                <form action="" method="post" enctype="multipart/form-data" id="formAgregarProducto">
                    {% csrf_token %}
                    
                    {{ form | crispy }}
                    
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <hr class="border-secondary opacity-25">
                        
                        <button type="button" onclick="confirmarGuardarProducto()" class="btn px-3 py-2" style="background-color: #FCB2D3; color: white; font-weight: bold; font-size: 1.1rem;">
                            Guardar
                        </button>
                        
                        <a href="{% url 'admin_listar_producto' %}" class="btn btn-secondary d-flex align-items-center py-2">
                            Cancelar
                        </a>
                    </div>
                </form>
                
                {% if mensaje %}
                <div class="alert alert-info mt-3">
                    {{ mensaje }}
                </div>
                {% endif %}
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
