{% extends 'panel_admin/base.html' %}

{% block main %}
<div class="row g-5 mb-5">
    
    <!-- Tarjeta 1 -->
    <div class="col-md-4">
        <div class="card shadow-sm h-100" style="border-radius:5px">
            <div class="card-body text-center">
                <h5 class="card-title">Lista de productos</h5>
                <br>
                <hr>
                <i class="bx bx-calendar-star fs-1 mb-2" style="color:#e4228d;"></i>
                <p>Cantidad de eventos</p>
                <a href="{% url 'listar_evento' %}" class="btn btn-md" style="background-color: #e4228d;color:white;">IR</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm h-100" style="border-radius:5px">
            <div class="card-body text-center">
                <h5 class="card-title">Ingresar Nuevos eventos</h5>
                <br>
                <hr>
                <i class="bx bx-calendar-plus fs-1 mb-2" style="color:#e4228d;"></i>
                <p>Agregar productos al inventario</p>
                <a href="{% url 'agregar_evento' %}" class="btn btn-md" style="background-color: #e4228d;color:white;">IR</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm h-100" style="border-radius:5px">
            <div class="card-body text-center">
                <h5 class="card-title">Clasificacion de productos</h5>
                <br>
                <hr>
                <i class="bx bx-list-check fs-1 mb-2" style="color:#e4228d;"></i>
                <p>Crear y organizar categorías</p>
                <a href="{% url 'listar_categoria' %}" class="btn btn-md" style="background-color: #e4228d;color:white;">IR</a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
