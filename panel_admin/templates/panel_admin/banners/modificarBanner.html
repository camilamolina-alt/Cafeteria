{% extends 'panel_admin/base.html' %}
{% load crispy_forms_tags %}
{% block main %}

<br><br>
<div class="col-12 col-md-6 offset-md-3">
    <div class="card">
        <h2 style="font-family: 'Montserrat', sans-serif; color: #e4228d; padding-top: 20px; padding-left: 20px;">Editar Banner</h2>
        <hr class="border-secondary opacity-25">
        <br>
        <div class="card-body">
            <div class="row">
                <form action="" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form | crispy }}

                    <div class="d-flex justify-content-center">
                        <hr class="border-secondary opacity-25">
                        
                        <input type="submit" value="Guardar Cambios" class="btn px-2 py-2" style="background-color: #FCB2D3; color: white; font-weight: bold; font-size: 1.1rem; margin-right: 10px;">
                        
                        <a href="{% url 'admin_listar_banner' %}" class="btn btn-secondary d-flex align-items-center">Cancelar</a>
                    </div>
                </form>
                {{ mensaje }}
            </div>
        </div>
    </div>
</div>

{% endblock %}
